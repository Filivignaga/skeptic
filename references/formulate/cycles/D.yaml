cycle: D
focus: Operationalization
mandatory: true

upstream:
  - contract.question_type
  - contract.unit_of_analysis
  - contract.route_candidates
  - protocol_handoff.data_usage_considerations

setup_side_effects: []

checklist:
  - id: D01
    question: Which terms in the question are vague, contested, or not directly mapped to a column?
    skip_when: never
    script_evidence_key: vague_terms
  - id: D02
    question: For each such term, what are the candidate columns or derived metrics, and what are the tradeoffs between them?
    skip_when: never
    script_evidence_key: candidate_operationalizations
  - id: D03
    question: For each candidate operationalization, what is the practical availability (granularity, missingness, support, value distribution, direct measure vs. proxy)?
    skip_when: never
    script_evidence_key: availability_per_candidate
  - id: D04
    question: What is the target quantity or estimand the later analysis must estimate, summarize, predict, or explain?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Recorded in contract.target_quantity.
  - id: D05
    question: What claim boundary is implied by the question type and data design?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Recorded in claim_boundary (claim_type, scope, evidence_ceiling, generalization_limit).
  - id: D06
    question: What is the unit of analysis, and what is the target population or deployment context if it materially matters?
    skip_when: unit of analysis already fixed in Cycle B (for the unit portion only)
    script_evidence_key: unit_and_target_population_evidence
  - id: D07
    question: What are the ordered route candidates for later stages, and why is the top route best?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Recorded in contract.route_candidates with rationale.
  - id: D08
    question: What related concepts, effect modifiers, confounders, or structural dependencies must later stages respect?
    skip_when: never
    script_evidence_key: structural_dependencies
  - id: D09
    question: What key assumptions are required for the approved formulation to remain coherent?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Recorded in contract.key_assumptions.
  - id: D10
    question: What is the baseline the project must beat?
    skip_when: never
    script_evidence_key: baseline_evidence
  - id: D11
    question: What does each error type (false positive, false negative, over/underestimation, etc.) cost in the decision context? Which errors are unacceptable regardless of overall accuracy?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Recorded in contract.error_costs with `unacceptable: true` flagged.
  - id: D12
    question: What minimum uplift over baseline would make this project worthwhile?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Recorded in contract.minimum_uplift.
  - id: D13
    question: What prior art or analogous work changes the question framing, scope, assumptions, or project order?
    skip_when: never
    script_evidence_key: null
    note: Judgment-driven. Sourced primarily from the research subagent output.

gates:
  - id: D-terms-identified
    depends_on: [D01]
    condition: Abstract or ambiguous terms are identified
    diagnostic: false
  - id: D-terms-operationalized
    depends_on: [D02]
    condition: Each key term is mapped to a column, metric, or derived metric
    diagnostic: false
  - id: D-competing-defs
    depends_on: [D02]
    condition: For each critical operationalization, one alternative is instantiated and shown to yield the same claim_type and same top-ranked route; divergence forces a narrowing entry (added verbs_forbidden or tightened generalization_limit) in claim_boundary
    diagnostic: false
  - id: D-availability-checked
    depends_on: [D03]
    condition: Practical availability is verified for chosen operationalizations
    diagnostic: false
  - id: D-target-quantity-stated
    depends_on: [D04]
    condition: Target quantity or estimand is named
    diagnostic: false
  - id: D-claim-boundary-stated
    depends_on: [D05]
    condition: Claim boundary is stated explicitly
    diagnostic: false
  - id: D-unit-of-analysis-stated
    depends_on: [D06]
    condition: Unit of analysis is explicitly stated
    diagnostic: false
  - id: D-context-stated
    depends_on: [D06]
    condition: Target population or deployment context is stated if relevant
    diagnostic: false
  - id: D-route-candidates-ranked
    depends_on: [D07]
    condition: Route candidates are ranked and justified
    diagnostic: false
  - id: D-related-concepts
    depends_on: [D08]
    condition: Related concepts, modifiers, or confounders are identified
    diagnostic: false
  - id: D-assumptions-stated
    depends_on: [D09]
    condition: Key assumptions are stated explicitly
    diagnostic: false
  - id: D-baseline-stated
    depends_on: [D10]
    condition: Baseline the project must beat is stated
    diagnostic: false
  - id: D-error-costs-stated
    depends_on: [D11]
    condition: Error types and their costs in the decision context are stated, including which errors are unacceptable
    diagnostic: false
  - id: D-uplift-stated
    depends_on: [D12]
    condition: Minimum useful uplift over baseline is stated
    diagnostic: false
  - id: D-prior-art-reviewed
    depends_on: [D13]
    condition: Prior art or analogous work is reviewed and its consequences for scope, assumptions, or project order are stated
    diagnostic: false
  - id: D-unfeasible-flagged
    depends_on: [D01, D02]
    condition: Un-operationalizable terms are flagged with a recommended action
    diagnostic: false
  - id: D-measurement-mismatch
    depends_on: [D03]
    condition: Direct measure vs. proxy risk is assessed for each chosen operationalization
    diagnostic: true
  - id: D-confounding
    depends_on: [D08]
    condition: Confounding or identification relevance is assessed at a high level
    diagnostic: true

research_questions:
  - For each abstract term, what are the standard and competing operationalizations in credible literature or domain practice?
  - What validated measures, indices, or proxies exist?
  - What known confounders, effect modifiers, or structural dependencies matter for this kind of question?
  - When direct measures are unavailable, which proxies are accepted and what do they fail to capture?
  - What prior art or analogous analyses already constrain the interpretation of the question or its target quantity?
  - What baseline or success criteria are used in similar work, and do they change the practical framing here?

script_contract:
  evidence_keys:
    - vague_terms                   # list of {term, why_vague}
    - candidate_operationalizations # {term: [{candidate, kind: direct|derived|proxy, tradeoffs}]}
    - availability_per_candidate    # {term: {candidate: {granularity, missingness_pct, support, value_distribution_summary, measure_kind: direct|proxy}}}
    - structural_dependencies       # {effect_modifiers: [...], confounders: [...], hierarchies_or_panels: [...]}
    - unit_and_target_population_evidence  # {unit_description, target_population_or_deployment_context, evidence}
    - baseline_evidence             # {baseline_description, how_computed_from_data_or_prior_art, numeric_value_if_any}
  forbidden:
    - Writing to 01_formulation.yaml
    - Emitting anything other than one JSON object to stdout
    - Dumping full DataFrames; summarize to fixed-size records

contract_writes:
  - contract.approved_question
  - contract.target_quantity
  - contract.unit_of_analysis
  - contract.target_population
  - contract.route_candidates
  - contract.baseline
  - contract.minimum_uplift
  - contract.error_costs
  - contract.key_assumptions
  - contract.operationalization
  - contract.derived_metrics
  - contract.hypothesis
  - contract.intended_uses
  - contract.prohibited_uses
  - claim_boundary.claim_type
  - claim_boundary.scope
  - claim_boundary.evidence_ceiling
  - claim_boundary.generalization_limit

guidance:
  - If no viable operationalization exists for a key term, do not bury it. Flag it and force the user decision in Step 4.
  - D-measurement-mismatch and D-confounding are diagnostic. A FAIL signals a bounded risk. It does not auto-fail the cycle if the issue is surfaced clearly and the user proceeds with the risk documented.
  - The approved question wording must include operationalized definitions inline.
  - If the question is inferential or causal, `contract.hypothesis` must be populated (null, alt, treatment, outcome). For other types, leave `contract.hypothesis` as null.

step4_additions:
  description: After the standard decision, propose a refined question with operationalized definitions inline. State all of the following before closing the cycle.
  items:
    - approved_question_wording
    - question_type
    - target_quantity_or_estimand
    - claim_boundary
    - ordered_route_candidates
    - unit_of_analysis
    - target_population_or_deployment_context_if_relevant
    - key_assumptions
    - baseline_error_costs_and_minimum_uplift
    - prior_art_implications_for_scope_or_order
    - hypothesis_structure_if_inferential_or_causal
    - intended_and_prohibited_uses
  user_approval: required
  note: Do not auto-finalize this cycle without explicit user approval of the wording and the boundary.

pcs_checkpoint:
  before: Step 5
  items:
    - "P: Does the chosen operationalization estimate the same quantity the validated literature measure does? Cite the source."
    - "C: Can another analyst reconstruct target_quantity, claim_boundary, and top route from the script evidence and canonical YAML alone?"
    - "S: Does the nearest alternative for the top critical term change claim_type or the top route?"
  fail_action: On a Stability FAIL, revise the operationalization or append a narrowing entry to claim_boundary.narrowing_log (via the canonical YAML, only by this stage while still open).

log_extension:
  description: Cycle D's cycle_history entry must include explicit decision-register fields even though they duplicate contract fields. This keeps the per-cycle audit of the operationalization decisions self-contained.
  cycle_history_extra_fields:
    approved_question:
    question_type:
    target_quantity:
    claim_boundary_summary:
    route_candidates_ordered:
    unit_of_analysis:
    target_population:
    key_assumptions: []
    operationalization_decisions: {}      # {term: {chosen, rationale}}
    alternatives_ruled_out: {}            # {term: [{alternative, why_rejected}]}
    derived_metrics_introduced: {}        # {name: formula}
