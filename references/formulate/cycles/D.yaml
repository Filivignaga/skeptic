cycle: D
name: Operationalization
mandatory: true
depends_on:
  - A
  - B
  - C
script_function: run_cycle_d
inputs:
  - 01_formulation.yaml
  - Cycle A-C outputs
required_artifacts:
  read:
    - 01_formulation.yaml
  update:
    - 01_formulation.yaml
outputs:
  - approved question wording
  - operationalization table
  - target quantity
  - claim boundary
  - route ranking
  - assumptions and decision costs
  - cycle decision recorded in stage YAML history
checklists:
  - id: D01
    question: Which terms in the question are vague, contested, or not directly mapped to a column?
    skip_when: never
  - id: D02
    question: For each such term, what are the candidate columns or derived metrics, and what are the tradeoffs between them?
    skip_when: never
  - id: D03
    question: For each candidate operationalization, what is the practical availability, including missingness, support, granularity, and proxy risk?
    skip_when: never
  - id: D04
    question: What is the target quantity or estimand the later analysis must estimate, summarize, predict, or explain?
    skip_when: never
  - id: D05
    question: What claim boundary is implied by the question type and data design?
    skip_when: never
  - id: D06
    question: What is the unit of analysis, and what is the target population or deployment context if it materially matters?
    skip_when: unit of analysis already fixed in Cycle B for the unit portion only
  - id: D07
    question: What are the ordered route candidates for later stages, and why is the top route best?
    skip_when: never
  - id: D08
    question: What related concepts, effect modifiers, confounders, or structural dependencies must later stages respect?
    skip_when: never
  - id: D09
    question: What key assumptions are required for the approved formulation to remain coherent?
    skip_when: never
  - id: D10
    question: What baseline must the project beat?
    skip_when: never
  - id: D11
    question: What do different error types cost in the decision context, and which errors are unacceptable?
    skip_when: never
  - id: D12
    question: What minimum uplift over baseline makes the project worthwhile?
    skip_when: never
  - id: D13
    question: What prior art or analogous work changes the framing, scope, assumptions, or order?
    skip_when: never
gates:
  - name: terms_identified
    depends_on: [D01]
    diagnostic: false
    condition: Abstract or ambiguous terms are identified.
  - name: terms_operationalized
    depends_on: [D02]
    diagnostic: false
    condition: Each key term is mapped to a column, metric, or derived metric.
  - name: competing_definitions
    depends_on: [D02]
    diagnostic: false
    condition: A competing operationalization is instantiated for each critical term, and divergence is logged as a claim-boundary narrowing when required.
  - name: availability_checked
    depends_on: [D03]
    diagnostic: false
    condition: Practical availability is verified for chosen operationalizations.
  - name: target_quantity_stated
    depends_on: [D04]
    diagnostic: false
    condition: Target quantity or estimand is named.
  - name: claim_boundary_stated
    depends_on: [D05]
    diagnostic: false
    condition: Claim boundary is explicit.
  - name: route_candidates_ranked
    depends_on: [D07]
    diagnostic: false
    condition: Route candidates are ranked and justified.
  - name: unit_of_analysis_stated
    depends_on: [D06]
    diagnostic: false
    condition: Unit of analysis is explicit.
  - name: context_stated
    depends_on: [D06]
    diagnostic: false
    condition: Target population or deployment context is explicit when relevant.
  - name: assumptions_stated
    depends_on: [D09]
    diagnostic: false
    condition: Key assumptions are explicit.
  - name: related_concepts
    depends_on: [D08]
    diagnostic: false
    condition: Related concepts and structural dependencies are identified.
  - name: baseline_stated
    depends_on: [D10]
    diagnostic: false
    condition: Baseline is stated.
  - name: error_costs_stated
    depends_on: [D11]
    diagnostic: false
    condition: Error costs and unacceptable errors are stated.
  - name: uplift_stated
    depends_on: [D12]
    diagnostic: false
    condition: Minimum useful uplift is stated.
  - name: prior_art_reviewed
    depends_on: [D13]
    diagnostic: false
    condition: Prior art implications are reviewed and connected to scope or order.
  - name: unfeasible_flagged
    depends_on: [D01, D02]
    diagnostic: false
    condition: Un-operationalizable terms are flagged with a recommended action.
  - name: measurement_mismatch
    depends_on: [D03]
    diagnostic: true
    condition: Direct-measure versus proxy risk is assessed for each chosen operationalization.
  - name: confounding
    depends_on: [D08]
    diagnostic: true
    condition: Confounding or identification relevance is assessed at a high level.
research_questions:
  - What are the standard and competing operationalizations for each abstract term?
  - What validated measures, indices, or proxies exist?
  - What confounders, effect modifiers, or structural dependencies matter?
  - What baseline or success criteria are used in similar work?
stage_yaml_updates:
  - question_contract.approved_question
  - question_contract.target_quantity
  - question_contract.route_candidates
  - question_contract.unit_of_analysis
  - question_contract.target_context
  - question_contract.baseline
  - question_contract.minimum_useful_uplift
  - question_contract.unacceptable_errors
  - claim_boundary.scope
  - claim_boundary.evidence_ceiling
  - claim_boundary.generalization_limit
  - cycle_state.current_cycle
  - cycle_state.iteration_counts
  - gates.latest
guidance:
  judgment_rules:
    - Cycle D locks the approved question wording.
    - Every major decision belongs in structured YAML fields before any prose summary.
    - Use competing definitions to test whether the claim boundary needs narrowing, and narrow it immediately when they change claim type or route.
  execution_goals:
    - Resolve abstract terms into explicit measures or named open issues.
    - Match the claim boundary tightly to what the operationalization can support.
    - State proxy risk and confounding relevance as direct structured findings.
