cycle: B
name: Data Understanding
mandatory: true
depends_on:
  - A
script_function: run_cycle_b
inputs:
  - 01_formulation.yaml
  - Cycle A outputs
required_artifacts:
  read:
    - 01_formulation.yaml
  update:
    - 01_formulation.yaml
    - formulation_metrics.json
    - formulation_decision_log.jsonl
outputs:
  - variable meaning map
  - unit-of-analysis assessment
  - ambiguity registry
  - ideal-versus-available data gap assessment
checklist_ids:
  - B01
  - B02
  - B03
  - B04
  - B05
checklists:
  - id: B01
    question: What do the relevant variables mean in domain context, including units and expected ranges?
    skip_when: never
  - id: B02
    question: What relationships exist between columns, and do derived columns already exist?
    skip_when: never
  - id: B03
    question: What does each row represent as the unit of analysis or observational unit?
    skip_when: never
  - id: B04
    question: Where do materially different interpretations exist, and which interpretation is chosen?
    skip_when: no ambiguity surfaced in Cycle A
  - id: B05
    question: What would the ideal dataset include for this question, and what is present versus missing?
    skip_when: never
gate_ids:
  - B-variables-understood
  - B-units-clear
  - B-no-ambiguity
  - B-gap-assessed
gates:
  - id: B-variables-understood
    depends_on: [B01, B02]
    diagnostic: false
    condition: Relevant variables are understood well enough to reason about the question.
  - id: B-units-clear
    depends_on: [B03]
    diagnostic: false
    condition: Unit of analysis or observational unit is clear.
  - id: B-no-ambiguity
    depends_on: [B04]
    diagnostic: false
    condition: Major ambiguities that would distort interpretation are surfaced and resolved or explicitly carried forward.
  - id: B-gap-assessed
    depends_on: [B05]
    diagnostic: false
    condition: The gap between available data and ideal evidence is explicit.
research_questions:
  - What do the specific variables and measurements mean in domain context?
  - What are the standard units, scales, and expected ranges?
  - What variables would an ideal dataset include for this question?
  - What sampling or instrumentation details matter for correct interpretation?
stage_yaml_updates:
  - question_contract.unit_of_analysis
  - question_contract.target_context
  - question_contract.assumptions
  - cycle_state.current_cycle
  - cycle_state.iteration_counts
  - gates.latest
guidance:
  judgment_rules:
    - Force explicit choices when a variable or row meaning has multiple live interpretations.
    - Distinguish clearly between what is observed, derived, missing, and only wished for.
    - Keep variable understanding in structured fields whenever possible.
  execution_goals:
    - Resolve meaningful ambiguity instead of carrying it forward implicitly.
    - Separate row identity from the eventual analysis target clearly.
    - Label derived columns explicitly so their evidential role stays clear.
