cycle: B
focus: Data Understanding
mandatory: true

upstream:
  - provenance.file_hashes
  - provenance.encoding
  - contract.audience
  - contract.decision_context

setup_side_effects: []

checklist:
  - id: B01
    question: What do the relevant variables mean in domain context, including units and expected ranges?
    skip_when: never
    script_evidence_key: variable_meaning
  - id: B02
    question: What relationships exist between columns, and do derived columns already exist?
    skip_when: never
    script_evidence_key: column_relationships
  - id: B03
    question: What does each row represent (unit of analysis / observational unit)?
    skip_when: never
    script_evidence_key: unit_of_analysis_evidence
  - id: B04
    question: Where do materially different interpretations exist, and which interpretation does the user choose?
    skip_when: no ambiguity surfaced in Cycle A
    script_evidence_key: interpretation_ambiguities
  - id: B05
    question: What would the ideal dataset for this question contain, and what is present versus missing?
    skip_when: never
    script_evidence_key: ideal_vs_actual_gap

gates:
  - id: B-variables-understood
    depends_on: [B01, B02]
    condition: Relevant variables are understood well enough to reason about the question
    diagnostic: false
  - id: B-units-clear
    depends_on: [B03]
    condition: Unit of analysis or observational unit is clear
    diagnostic: false
  - id: B-no-ambiguity
    depends_on: [B04]
    condition: Major ambiguities that would distort interpretation are surfaced, and the user's chosen interpretation is recorded
    diagnostic: false
  - id: B-gap-assessed
    depends_on: [B05]
    condition: Gap between available data and ideal data is explicitly assessed
    diagnostic: false

research_questions:
  - What do the specific variables and measurements mean in domain context?
  - What are standard units, scales, and expected ranges for these measurements?
  - What variables would an ideal dataset include for answering this question, and which are present versus missing?
  - What sampling or instrumentation details matter for interpreting these variables correctly?

script_contract:
  evidence_keys:
    - variable_meaning              # {column: {dtype, range_observed, likely_unit, likely_meaning_from_schema_or_codebook}}
    - column_relationships          # {pairs: [{a, b, relationship: computed|derived|correlated|near-duplicate, evidence}]}
    - unit_of_analysis_evidence     # {per_file: {candidate_unit_keys, duplicate_key_rate, row_grain_description}}
    - interpretation_ambiguities    # list of {column_or_concept, candidate_interpretations, how_they_differ}
    - ideal_vs_actual_gap           # {ideal_fields, present_fields, missing_fields, proxies_if_any}
  forbidden:
    - Writing to 01_formulation.yaml
    - Emitting anything other than one JSON object to stdout
    - Dumping full DataFrames; summarize to fixed-size records

contract_writes:
  - contract.unit_of_analysis
  - contract.key_assumptions                 # append only assumptions that are actually required at this point
  - contract.operationalization              # seed entries for terms now understood well enough to start pinning

guidance:
  - Where materially different interpretations exist, force the user to choose. Do not let ambiguity survive into later stages.
  - Record the chosen interpretation in contract.operationalization with rationale, and list rejected interpretations in rejected_alternatives.
  - The "ideal dataset" gap is not a failure signal by itself. Record it so `protocol` and later stages can reason about it.

step4_additions: null
pcs_checkpoint: null
log_extension: null
