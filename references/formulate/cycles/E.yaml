cycle: E
focus: Collection and Biases
mandatory: true

upstream:
  - contract.approved_question
  - contract.question_type
  - contract.target_population
  - claim_boundary.claim_type

setup_side_effects: []

checklist:
  - id: E01
    question: How was the data collected, generated, sampled, or recorded?
    skip_when: never
    script_evidence_key: collection_process
  - id: E02
    question: What is the time coverage, refresh cadence, and are there temporal gaps?
    skip_when: never
    script_evidence_key: temporal_profile
  - id: E03
    question: Is there grouping, clustering, panel, hierarchy, or interference structure?
    skip_when: never
    script_evidence_key: structure_profile
  - id: E04
    question: Is the data a one-off extract, a monitoring stream, or a partially refreshed process? Are leakage-relevant fields or structures present (future information, post-outcome fields, target proxies, delayed labels, timestamp lookahead)?
    skip_when: never
    script_evidence_key: leakage_scan
  - id: E05
    question: How representative is the data relative to the target population or deployment context?
    skip_when: never
    script_evidence_key: representativeness_evidence
  - id: E06
    question: Enumerate biases against a named taxonomy (ROBINS-I seven domains plus immortal-time, Berkson, and positivity-violation). For each domain state present/absent/uncertain, direction, severity, and current mitigation. For any row rated serious or critical, give a quantitative bound (E-value, Lash-style range, or direction-and-magnitude estimate) or an explicit deferral naming what data would allow bounding it.
    skip_when: never
    script_evidence_key: bias_taxonomy_table
  - id: E07
    question: Is the question tied to a deployment context, a reporting frame, or a population-level claim, and what kinds of future validation may be needed at a high level?
    skip_when: never
    script_evidence_key: null
  - id: E08
    question: What unresolved questions must be passed to `protocol`?
    skip_when: never
    script_evidence_key: null

gates:
  - id: E-collection-understood
    depends_on: [E01]
    condition: Data collection process is understood well enough to proceed
    diagnostic: false
  - id: E-biases-assessed
    depends_on: [E05, E06]
    condition: Collection, selection, recall, measurement, and other relevant biases are assessed against the named taxonomy
    diagnostic: false
  - id: E-generalizability
    depends_on: [E06]
    condition: Generalizability risks relative to target population or deployment context are assessed
    diagnostic: false
  - id: E-data-usage-facts
    depends_on: [E01, E02, E03, E04]
    condition: Facts needed by `protocol` to decide data-usage mode are surfaced
    diagnostic: false
  - id: E-validation-needs-framed
    depends_on: [E07]
    condition: High-level future validation needs are framed without locking the protocol
    diagnostic: true
  - id: E-open-protocol-questions
    depends_on: [E08]
    condition: Unresolved questions for `protocol` are explicitly listed
    diagnostic: false

research_questions:
  - How is this type of data typically collected in practice, and what limitations usually follow?
  - What selection, recall, measurement, or surveillance biases are documented for similar sources?
  - How far do findings from this kind of data usually generalize?
  - What validation patterns are commonly needed for similar questions (refreshed data, external corroboration, group-aware checks, rolling validation, resampling, or something else)?

script_contract:
  evidence_keys:
    - collection_process            # {description, evidence_source, known_filters, generation_mechanism}
    - temporal_profile              # {start, end, cadence, gaps: [{from, to, reason_if_known}]}
    - structure_profile             # {grouping: bool, grouping_key, panels: bool, hierarchy: bool, interference_risk, evidence}
    - leakage_scan                  # {candidate_leak_fields: [{column, why_suspect}], timestamp_lookahead_risk, post_outcome_fields}
    - representativeness_evidence   # {target_population_or_deployment, coverage_vs_target, skew_or_mismatch}
    - bias_taxonomy_table           # list of {domain: one of [confounding, participant_selection, exposure_classification, protocol_departure, missing_data, outcome_measurement, reporting_selection, immortal_time, berkson, positivity_violation], presence: present|absent|uncertain, direction: toward_null|away|unknown, severity: critical|serious|moderate|low, current_mitigation, quantitative_bound_or_deferral}

contract_writes:
  - provenance.collection_purpose
  - provenance.sampling_frame
  - provenance.upstream_exclusions
  - protocol_handoff.data_usage_considerations
  - protocol_handoff.leakage_risks
  - protocol_handoff.forbidden_variable_candidates
  - protocol_handoff.validation_needs
  - protocol_handoff.structure_notes
  - protocol_handoff.route_family_stability
  - protocol_handoff.generalizability_risks
  - protocol_handoff.open_questions

guidance:
  - Do not decide the final data-usage mode here. Surface the facts that `protocol` needs to decide those things.
  - Do not create splits, folds, frozen holdouts, or validation artifacts.
  - For any bias row rated serious or critical, require a quantitative bound or an explicit deferral. "Unknown" is only acceptable with a concrete deferral that names what would allow bounding.

step4_additions:
  description: After the standard decision, produce a draft `protocol` handoff note that states each field listed below. The note populates protocol_handoff in the canonical YAML. This draft informs `protocol`. It does not replace `protocol`.
  items:
    - recommended_data_usage_considerations
    - leakage_relevant_facts_and_candidate_forbidden_variable_classes
    - whether_future_unseen_data_validation_seems_relevant
    - whether_confounding_or_identification_is_likely_central
    - whether_time_ordering_grouping_or_monitoring_context_matters
    - whether_the_route_family_seems_stable_or_still_uncertain
    - data_collection_and_generalizability_risks
    - unresolved_protocol_questions

pcs_checkpoint: null
log_extension: null
