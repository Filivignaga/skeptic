cycle: F
focus: Derived Variables and Related Downstream-Safe Transforms
mandatory: false
subagents: [research, evaluator]   # F3: research warrants dispatch -- derived variable definitions are judgment calls with domain dependency

upstream:
  - cleaning_decisions
  - preprocessing_decisions
  # A1: read approved_question, claim_boundary, forbidden_variable_classes, leakage_rules directly from upstream YAMLs at cycle start; do not copy here

setup_side_effects: []

checklist:
  - id: F01
    question: Is each proposed derived variable justified by the approved question and protocol, and does it fit exactly one of the three stage-core classes (formulation-approved derived metric, protocol-explicit structural transform, low-regret measurement-fidelity fix)?
    evidence_key: derived_justification         # list of {name, purpose, stage_core_class: formulation_approved|protocol_explicit|low_regret_measurement_fidelity, evidence, question_relevance, protocol_relevance}
    writes_to: derived_variables
  # F2: F02 (derived_compatibility) deleted -- F01 establishes the stage-core class and protocol relevance; F02 restated it.
  # Compatibility with question type, protocol, route file, forbidden classes, and leakage rules is now part of F01's evidence_key.
  - id: F03
    question: For each retained derived variable, what is the formula, rationale, meaning, missingness, distribution summary, and interpretation risk?
    evidence_key: derived_profile               # list of {name, formula, rationale, meaning, missingness, distribution_summary, interpretation_risk}
    writes_to: derived_variables

gates:
  - id: F01-derived-justified
    condition: Every retained derived variable fits exactly one of the three stage-core classes and names its question and protocol relevance
  # F2: F02-route-safe gate deleted along with F02 checklist item.
  - id: F03-derived-validated
    condition: Every retained derived variable carries a formula, rationale, meaning, missingness, distribution summary, and interpretation risk

research_questions:
  - Are the proposed derived variables already approved in formulate, explicitly authorized by protocol, or defensible as low-regret measurement-fidelity fixes?
  - What competing definitions exist, and do they push the work out of stage-core and into the route file or analyze?
  - Does any proposed variable create leakage, post-treatment problems, unsupported interpretation, or analysis-shaped drift?
  - Should this proposal stay in clean or be deferred downstream?

guidance:
  - Skip this cycle and record the skip in status.skipped_cycles when no derived variables are justified by the approved question and protocol (e.g., "Cycle F skipped: no derived variables justified by the approved question and protocol").
  - Feature engineering and analysis-shaped variable construction are not the purpose of this stage; defer them to the route file or analyze.
  - A derived variable that would widen the claim boundary is forbidden here; if the question requires it, reopen formulate rather than resolving it in F.
