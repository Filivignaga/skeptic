# C1: every required judgment gate below MUST dispatch AskUserQuestion; reply 'agent decides' is valid but the gate must be dispatched and recorded.
cycle: C
focus: Cleaning Resolution
mandatory: true
subagents: [research, evaluator]   # F3: research warrants dispatch -- cleaning policies turn on domain knowledge and measurement meaning

upstream:
  - data_contract.raw_artifacts
  - data_contract.cleaned_artifacts
  - data_contract.missing_vs_censored_rule
  - visibility.visible_artifacts
  - question_critical_variables
  # A1: read claim_boundary, clean_prohibitions, forbidden_variable_classes directly from upstream YAMLs at cycle start; do not copy here

setup_side_effects: []

checklist:
  # A4: C01-C04 collapse -- emit one composite record per issue instead of four parallel lists.
  # Each entry covers: issue_id, issue_description, policy_options [{option, preserves, destroys}],
  # chosen_policy, rationale, rationale_source, alternatives, reversibility, code_reference,
  # population_shift {before, after, interpretation}. All fields required by cleaning_decisions[]
  # must still be present per record (Block G narrowing preserved).
  - id: C01
    question: For each material issue surfaced in Cycles A and B, produce one composite record containing: the real policy options (with what each preserves and destroys), the chosen policy, its rationale and rationale class (measurement meaning, domain knowledge, data-generating process, protocol rule, transferability evidence), named alternatives, reversibility class, the implementing code reference in {scripts_dir_name}/03_cleaning.py, and the population shift (before, after, interpretation). Does the row-count reconciliation close (raw_rows minus ordered exclusions equals cleaned_rows)?
    evidence_key: cleaning_issue_records        # A4: list of {issue_id, issue_description, policy_options: [{option, preserves, destroys}], chosen_policy, rationale, rationale_source, alternatives, reversibility, code_reference, population_shift: {before, after, interpretation}}
    writes_to: [cleaning_decisions, row_count_reconciliation]
  - id: C05
    question: For each material action, what is the claim consequence (none, narrower coverage, changed interpretation, or backtracking required), and does any action require appending a narrowing entry to claim_boundary_updates.narrowing_log?
    evidence_key: claim_consequences            # list of {issue_id, consequence: none|narrower|changed_interpretation|backtracking_required, narrowing_entry_if_any}
    writes_to: [cleaning_decisions, claim_boundary_updates.narrowing_log]
  - id: C06
    question: Is the cleaned dataset still fit for the approved question, is additional data now required, is the approved question still appropriate for this dataset, did cleaning reveal a protocol mismatch, and did cleaning reveal a formulation mismatch?
    evidence_key: fitness_checkpoint            # {still_fit, new_data_required, question_still_appropriate, protocol_mismatch, formulation_mismatch, notes}
    writes_to: dataset_fitness_reviews
  - id: C07
    question: Does the cleaned output look suspiciously neat (remaining missingness zero, zero edge cases, perfectly uniform distributions, identifier collisions vanished without an explicit policy, high-signal columns dominating the data), and if trigger conditions appear, how were they challenged?
    skip_when: no trigger conditions observed in the cleaned output after inspection
    evidence_key: suspicious_cleanliness_audit  # {trigger_conditions_observed: [{trigger, description}], challenge_response, final_verdict: clean|re_examine}
    writes_to: null

gates:
  # A4: gates updated to match composite evidence record shape
  - id: C01-composite-records-complete
    condition: Every material issue from Cycles A and B has a composite record with policy_options (at least two, each with preserves/destroys), chosen_policy, rationale, rationale_source, named alternatives, reversibility class, code_reference traceable to the implementing function in {scripts_dir_name}/03_cleaning.py, and population_shift
  - id: C01-row-count-reconciled
    condition: Row-count arithmetic (raw_rows minus ordered exclusions equals cleaned_rows) matches the actual cleaned artifact row count; any discrepancy is a blocking defect
  - id: C05-claim-impact-stated
    condition: Every material action has an explicit claim consequence; narrowing entries are appended to claim_boundary_updates.narrowing_log where applicable
  - id: C06-fitness-checkpoint-run
    condition: The dataset fitness checkpoint is completed and any no or unclear answer is surfaced to the user as a decision point rather than buried in gaps
  - id: C07-suspicious-cleanliness-reviewed
    condition: Trigger conditions are challenged on the record with a final verdict; the skip_when path is taken only when no trigger conditions were observed after inspection

research_questions:
  - Which competing cleaning policies are defensible for the flagged issues?
  - What population or interpretation shifts follow from each plausible cleaning action?
  - Are any proposed actions likely to erase meaningful variation or create artificial regularity?
  - Does any unresolved issue indicate a protocol mismatch rather than a pure cleaning problem?
  - Which rationale classes (measurement meaning, domain knowledge, data-generating process, protocol rule, transferability evidence) best support each candidate policy?

guidance:
  - When convenience conflicts with meaning, choose meaning.
  - If a proposed action requires protocol-forbidden visibility, unauthorized use of restricted artifacts, or a wider claim than the approved boundary, stop and reopen upstream instead of forcing it through.
  - A cleaning action that materially changes the analyzable population must carry an explicit population-shift statement and, where relevant, a narrowing entry in claim_boundary_updates.narrowing_log.
  - If a value-cleaning fix would really require a semantic rethink, route the issue to a D-series follow-up or back upstream rather than resolving it in C.


pcs_focus:
  items:
    - "P: Do cleaning policies match the data-generating process rather than convenience? Cite the rationale source for each material decision."
    - "C: Is every material transformation implemented in {scripts_dir_name}/03_cleaning.py code that another analyst can rerun from the canonical YAML and the raw files alone?"
    - "S: Would any single judgment call, reversed, change the analyzable population enough to alter the claim boundary?"

# F1 closeout: preprocessing decisions recorded here (Cycle E deleted; E04/E05 absorbed into C closeout per Block G narrowing).
# Required fields per preprocessing_decisions[] entry:
#   columns (list or single column name), transform, rationale, rationale_class
#   (measurement_meaning|domain_knowledge|data_generating_process|protocol_rule|transferability_evidence),
#   reversibility (reversible|partially_reversible|irreversible),
#   fit_scope_decision (fit_from_visible_only|no_fit_required|deferred),
#   deferred_to (null|route_file|analyze),
#   claim_consequence (none|narrower|changed_interpretation|backtracking_required).
# A5: when N columns share the same decision, rationale, reversibility, and fit_scope, record one entry with columns: [col_1, ..., col_N].
# Scope checks (formerly E01/E02/E03/E05/E06) applied here:
#   - Every preprocessing step must respect the question, protocol mode, visibility rules, forbidden variable classes, and leakage rules.
#   - Category, numeric, date, and time transforms must be meaning-preserving; uncertain cases deferred to a D-series follow-up.
#   - Fitting scope of any fit-from-data transform limited to protocol-allowed visible artifacts (no reserved validation, future, or restricted artifacts).
#   - Categorical expansion reference levels and omitted-category conventions documented when applicable.
# Cycle R obligation: every preprocessing_decisions[] entry must eventually map to a transform in preprocess_data(...).

# Evaluator checks per required gate:
# (1) cycle_history[*].subagents.decisions[*].judgment_gate.gate_id matches the required gate_id
# (2) judgment_gate.reply is a non-null string
# (3) if reply == "agent decides", both agent_decision_if_delegated and agent_rationale are non-null
# Any failure is a blocking defect.

judgment_gates:
  - gate_id: C01-irreversible-exclusion-above-threshold
    stage: clean
    cycle: C
    trigger: "C01 records any irreversible exclusion whose row_fraction exceeds the project-declared row-fraction threshold (itself user-approved before the gate fires)"
    question_text: "Irreversible exclusion for issue <issue_id>: proposed policy removes <row_fraction> of rows (threshold is <user_approved_threshold>). This exceeds the project threshold. Confirm exclusion, choose an alternative policy, or reply 'agent decides'."
    options_shape: "labeled_options; reply 'agent decides' is valid"
    recorded_under: "cycle_history[*].subagents.decisions[*].judgment_gate"
    required: true
    note: "The row-fraction threshold itself must be user-approved (or recorded with agent_decision_if_delegated) before this gate can evaluate; it is not hard-coded in the spec."
