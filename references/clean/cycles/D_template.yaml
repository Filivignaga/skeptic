cycle: D{n}
focus: '{short description of the unresolved cleaning topic, e.g. ''Resolve duplicate-classification conflict for customer-event
  rows''}'
mandatory: false
upstream:
- '{list canonical-YAML fields that must be set before the follow-up runs, e.g. cleaning_decisions, row_count_reconciliation,
  dataset_fitness_reviews}'
research_questions:
- '{at most a handful; narrow to the unresolved cleaning topic}'
guidance:
- Keep the follow-up narrow. One cleaning topic per cycle.
- If the topic recurs across follow-ups, escalate instead of looping.
- If the issue is actually a protocol or formulation mismatch, stop and reopen upstream rather than forcing a D-series resolution.
- Close the follow-up as pass, acknowledge_gap, data_insufficient, reopen_protocol, reopen_formulate, or archive under the
  standard decision matrix.
required_evidence:
- id: D{n}01
  question: '{question derived from the specific unresolved cleaning issue}'
  evidence_key: '{key name, or null if judgment-driven}'
writes:
  D{n}01: '{canonical-YAML field, list of fields, or null}'
acceptance_criteria:
- id: D{n}01-{short-name}
  condition: '{condition that closes the unresolved cleaning topic}'
