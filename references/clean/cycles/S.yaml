# C1: every required judgment gate below MUST dispatch AskUserQuestion; reply 'agent decides' is valid but the gate must be dispatched and recorded.
cycle: S
focus: Stability and Transfer Diagnostics
mandatory: true
subagents: [research, evaluator]   # F3: partial -- Layer execution is mechanical, but research covers S01/S02 only (threshold standards + transfer-diagnostic conventions)
# Note: research subagent is limited to S01/S02 questions (threshold derivation standards, transfer-diagnostic conventions).
# S03-S05 are mechanical execution and driver identification; research adds no gate-changing value there.

upstream:
  - reproducibility.clean_data_signature
  - reproducibility.preprocess_data_signature
  - reproducibility.snapshot_match
  - reproducibility.clean_constraints
  - reproducibility.preprocess_constraints
  - cleaning_decisions
  - preprocessing_decisions
  - derived_variables
  # A1: read data_usage_mode directly from 02_protocol.yaml at cycle start; do not copy here

setup_side_effects:
  - Extend {scripts_dir_name}/03_cleaning.py with a stability perturbation runner that sweeps high-impact judgment calls recorded in cleaning_decisions and preprocessing_decisions
  - Extend {scripts_dir_name}/03_cleaning.py with a protocol-conditioned transfer-diagnostics runner that executes only when transfer diagnostics are protocol-relevant and visible

checklist:
  - id: S01
    question: What instability thresholds apply to question-critical variables (maximum acceptable change in distribution, counts, or derived summaries under a perturbation), and are they approved?
    # Threshold derivation rule: mode `agent_chosen` is forbidden. Every numeric threshold must carry a `derivation:` block
    # with mode one of {empirical, declared_external_standard, upstream_ratio, user_specified}.
    # Structural-binary predicates (hash equality, null-count = 0 on declared non-nullable columns, row count >= 1 at load) are exempt.
    evidence_key: instability_thresholds        # {variable: {metric, threshold, derivation: {mode, source, computation, value, approved_by, approved_at}, approval_state, rationale}}
    writes_to: robustness.instability_thresholds
  - id: S02
    question: Are protocol-conditioned transfer diagnostics relevant and visible for this stage (restricted partitions the protocol allows inspecting for this purpose, temporal or group artifacts, external or secondary artifacts, later validation artifacts the protocol allows checking now)?
    evidence_key: transfer_diagnostics_decision  # {relevant: bool, visible: bool, decision: run|skip, skip_reason_if_any, diagnostics_if_run: {raw_vs_post_pipeline, artifact_transform_rates, interpretation}}
    writes_to: [robustness.transfer_diagnostics_status, robustness.transfer_diagnostics_reason]
  - id: S03
    question: Under Layer 1 one-at-a-time perturbations for high-impact judgment calls, which question-critical variables exceed their thresholds, and for each question-critical variable does at least one competing cleaning policy appear as a stability axis?
    evidence_key: layer1_perturbations          # list of {judgment_call, variable, metric, baseline, perturbed, delta, threshold, exceeded: bool, competing_policies_covered: bool}
    writes_to: robustness.layer1_perturbations
  - id: S04
    question: Should Layer 2 interaction perturbations run (user approved a fuller track or protocol complexity makes interaction effects plausible), and if run which interactions exceed thresholds?
    skip_when: user declined a Layer 2 track and protocol complexity does not make interaction effects plausible
    evidence_key: layer2_perturbations          # {performed: bool, reason, interactions: [{variables, metric, baseline, perturbed, delta, threshold, exceeded}]}
    writes_to: robustness.layer2_performed
  - id: S05
    question: Which variables are the main unstable ones, which judgment calls are the main risk drivers, is any instability severe enough to require reopening a D-series or G-series follow-up, and what is the explicit disposition (proceed, reopen a cycle, or acknowledge a documented risk with a reason) for every flagged issue from transfer diagnostics, Layer 1, and optional Layer 2?
    # F2/Block G narrowing: disposition-per-flagged-issue requirement moved here from deleted S06.
    evidence_key: instability_drivers           # {unstable_variables, risk_driving_judgment_calls, reopen_followup_recommendation, dispositions: [{flagged_issue, disposition: proceed|reopen|acknowledge_risk, reason}]}
    writes_to: [robustness.unstable_variables, robustness.risk_driving_judgment_calls, robustness.summary]
  # F2: S06 (robustness_summary) deleted -- prose derivable from S01-S05 structured fields.
  # The useful disposition-per-flagged-issue requirement has been absorbed into S05 (Block G narrowing).

gates:
  - id: S01-thresholds-approved
    condition: Instability thresholds exist for every question-critical variable and are approved (interactive) or recorded with autonomous approval reasoning (auto)
  - id: S02-transfer-decided
    condition: Transfer diagnostics are explicitly run when protocol-relevant and visible, or skipped with a concrete reason; no hallucinated holdout checks appear when the protocol chose full-data or resampling-only logic
  - id: S-perturbations-run
    depends_on: [S03, S04]
    condition: Layer 1 perturbations cover high-impact judgment calls and include at least one competing cleaning policy per question-critical variable; Layer 2 is either performed with results or skipped with a concrete reason
  - id: S05-drivers-identified
    condition: Unstable variables and risk-driving judgment calls are named; a reopen-or-proceed recommendation exists; and every flagged issue from transfer, Layer 1, or Layer 2 has an explicit disposition (proceed, reopen, or acknowledge_risk) with a reason (F2/Block G: disposition requirement absorbed from deleted S06)
  # F2: S06-dispositions-written gate deleted along with S06 checklist item.

research_questions:
  - What instability thresholds are commonly used for this kind of cleaning and preprocessing, and how are they chosen?
  - When does protocol-conditioned transfer-diagnostics evidence change a cleaning decision versus merely document a difference?
  - Which perturbations typically expose unstable judgment calls in cleaning pipelines of this kind?
  - When are Layer 2 interactions worth running rather than Layer 1 alone?

guidance:
  - Protocol-conditioned transfer diagnostics only run when the protocol makes them visible. Do not invent holdout transfer checks when the protocol chose full-data or resampling-only logic.
  - For each question-critical variable, Layer 1 must include at least one competing cleaning policy as a stability axis.
  - If a single reversed judgment call would change the analyzable population enough to alter the claim boundary, that is a reopen signal, not a threshold violation to normalize.

step4_additions:
  description: After the standard decision, state each field listed below before closing the cycle. These populate robustness.* in the canonical YAML.
  items:
    - transfer_diagnostics_verdict
    - layer1_summary
    - layer2_summary_or_skip_reason
    - main_unstable_variables
    - main_risk_drivers
    - dispositions_per_flagged_issue   # F2: replaces robustness_summary_paragraph (absorbed from deleted S06 into S05)

# Evaluator checks per required gate:
# (1) cycle_history[*].subagents.decisions[*].judgment_gate.gate_id matches the required gate_id
# (2) judgment_gate.reply is a non-null string
# (3) if reply == "agent decides", both agent_decision_if_delegated and agent_rationale are non-null
# Any failure is a blocking defect.

judgment_gates:
  - gate_id: S01-thresholds-approved
    stage: clean
    cycle: S
    trigger: "Always fires before any Layer 1 perturbation run; instability thresholds for question-critical variables must be user-approved before the cycle checks against them"
    question_text: "Instability threshold for <metric_name> on <variable_class>: agent proposes <threshold> (derivation: <mode>, source: <source>). Alternatives: <a> (stricter, more reopens), <b> (looser, wider tolerance). Reply with a value, a range, or 'agent decides'."
    options_shape: "value|range; reply 'agent decides' is valid"
    recorded_under: "cycle_history[*].subagents.decisions[*].judgment_gate"
    required: true

robustness:
  metric_graph:  # read-only reference to contract.metric_graph authored in analyze/cycles/A.yaml; do not re-author here
  instability_thresholds:
    <metric_name>:
      metric: <absolute_change_in_mean_or_other_statistic>
      threshold: <value>
      derivation:
        mode: empirical            # empirical | declared_external_standard | upstream_ratio | user_specified
        source: <descriptor>       # e.g. "2x bootstrap std of <metric> over 1000 resamples of visible cleaned data"
        computation: "<one-line description, empirical only>"
        value: <value>
        approved_by: user          # user | auto_mode_reasoning
        approved_at: <ISO timestamp>
