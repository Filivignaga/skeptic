# C1: every required judgment gate below MUST dispatch AskUserQuestion; reply 'agent decides' is valid but the gate must be dispatched and recorded.
# These judgment gates fire before step4 user_approval; step4 approval confirms the record, not the original choice.
cycle: A
focus: Contract Lock
mandatory: true
subagents: [research, evaluator]   # F3: method family selection, perturbation axes, and assumption-failure policy require methods expertise

upstream:
  # Read-only inputs from upstream stages (sourced outside 05_analysis.yaml)
  - 01_formulation.yaml:contract.approved_question
  - 01_formulation.yaml:contract.question_type
  - 01_formulation.yaml:contract.target_quantity
  - 01_formulation.yaml:contract.decision_context
  - 01_formulation.yaml:contract.unit_of_analysis
  - 01_formulation.yaml:claim_boundary
  - 02_protocol.yaml:active_route
  - 02_protocol.yaml:data_usage_mode
  - 02_protocol.yaml:visibility_rules
  - 02_protocol.yaml:leakage_rules
  - 02_protocol.yaml:forbidden_variable_classes
  - 02_protocol.yaml:validation_logic
  - 02_protocol.yaml:analyze_contract_lock_obligations
  - 02_protocol.yaml:analyze_claim_limits
  - 02_protocol.yaml:backtracking_triggers
  - 02_protocol.yaml:protocol_committed_analyses
  - 03_cleaning.yaml:final_visible_artifacts
  - 03_cleaning.yaml:final_variable_list
  - 03_cleaning.yaml:population_shift_summary
  - 04_examination.yaml:support_registry
  - 04_examination.yaml:analysis_handoff
  - 04_examination.yaml:analysis_constraints
  - 04_examination.yaml:fragility_verdicts

setup_side_effects:
  - Verify each upstream artifact parses and contains the fields analyze depends on. If any are missing, contradictory, or force widening of the claim boundary, stop and reopen the affected upstream stage.
  - Resolve exactly one active_route from 01_formulation.yaml plus 02_protocol.yaml. If they contradict or do not collapse to one route for analyze, stop and reopen protocol.
  - Load references/routes/{active_route}/analyze.md once; keep in memory for all cycles in this stage.
  - A2: record a compact hash verdict {expected_sha256, observed_sha256, match: bool} for each upstream artifact into provenance.upstream_artifacts; hash values do not propagate downstream -- only the match verdict is recorded.
  - A3: derive the active visibility set from 02_protocol.yaml and 03_cleaning.yaml; store as provenance.visibility.visible_artifacts [{name, access_level}] and provenance.visibility.restricted_artifacts. Optional provenance.visibility.visibility_hash for drift detection. Held-out artifacts are not visible unless protocol authorizes them for analyze.
  - Initialize {docs_dir_name}/05_analysis.yaml with stage, schema_version, project (project.name, project.started_at as ISO timestamp), status.current_cycle set to A, and status.active_route.
  - Create {scripts_dir_name}/05_analysis.py with the shape specified in the stage entry.

checklist:
  - id: A01
    question: Is the estimand or target quantity stated precisely enough to execute without further specification decisions, and is the decision anchor (stakeholder decision, candidate actions, action-change logic) inherited from formulate A06 stated inline?
    evidence_key: null
    writes_to: [contract.estimand, contract.decision_anchor]
  - id: A02
    question: What method family is selected, and what upstream evidence (examination support registry, protocol admissible evidence pattern, route overlay) justifies the choice?
    evidence_key: null
    writes_to: contract.method_family
  - id: A03
    question: What is the primary specification in full (variables, functional form, parameters, configuration) so another analyst could execute it without additional decisions?
    evidence_key: null
    writes_to: contract.primary_specification
  - id: A04
    question: What accuracy metric applies, and how does it match the route overlay requirement? The metric value or screening threshold must carry a derivation block with mode one of {empirical, declared_external_standard, upstream_ratio, user_specified}; mode agent_chosen is forbidden.
    skip_when: route overlay does not require an accuracy metric
    evidence_key: null
    writes_to: contract.accuracy_metric
    # accuracy_metric schema (when used):
    #   name: <metric_name>
    #   threshold: <value>
    #   derivation:
    #     mode: empirical            # empirical | declared_external_standard | upstream_ratio | user_specified
    #     source: <descriptor>
    #     computation: "<one-line description, empirical only>"
    #     value: <value>
    #     approved_by: user          # user | auto_mode_reasoning
    #     approved_at: <ISO timestamp>
  - id: A05
    question: What perturbation plan is locked -- axes, types, and scope -- and how does each axis probe route-relevant instability? Any numeric material-difference threshold per axis must carry a derivation block; mode agent_chosen is forbidden.
    evidence_key: null
    writes_to: contract.perturbation_plan
    # perturbation_plan threshold schema (per axis, when a numeric threshold applies):
    #   axes:
    #     - name: <axis_name>
    #       threshold:
    #         value: <value>
    #         derivation:
    #           mode: empirical            # empirical | declared_external_standard | upstream_ratio | user_specified
    #           source: <descriptor>
    #           computation: "<one-line description, empirical only>"
    #           value: <value>
    #           approved_by: user          # user | auto_mode_reasoning
    #           approved_at: <ISO timestamp>
  - id: A06
    question: What challenger alternatives are pre-specified, and for each one, what structural difference from the primary makes it a genuine stress test rather than cosmetic variation?
    evidence_key: null
    writes_to: contract.challenger_alternatives
  - id: A07
    question: What is the assumption-failure policy for Cycle B -- backtrack_only, or amendment_allowed with explicitly named pre-approved narrowing fallbacks?
    evidence_key: null
    writes_to: contract.assumption_failure_policy
  - id: A08
    question: What contract-level backtracking triggers (execution-viability conditions that invalidate this specification) are explicit?
    evidence_key: null
    writes_to: contract.backtracking_triggers
  - id: A09
    question: What missing-data rule specifies how missingness interacts with the locked method at execution time?
    evidence_key: null
    writes_to: contract.missing_data_rule
  - id: A10
    question: What claim boundary as-locked (same or narrower than the upstream boundary, never wider) applies to this contract, and what narrowing entries does the contract introduce?
    evidence_key: null
    writes_to: [contract.claim_boundary_as_locked, claim_boundary.narrowing_log_additions]
  - id: A11
    question: Which cleaned and protocol-created artifacts does the contract use, which are restricted, and what access level is allowed for each visible artifact?
    evidence_key: null
    writes_to: contract.visibility_confirmation
  - id: A12
    question: What subgroup rule (stratify, pool, mixture) applies, and how does it match the route overlay requirement?
    skip_when: route overlay does not require a subgroup rule
    evidence_key: null
    writes_to: contract.subgroup_rule
  - id: A13
    question: For each contract field, which examination support registry entry (supported, weakly supported, unsupported) informs it, and how does the contract address weak or unsupported fields?
    evidence_key: null
    writes_to: contract.examination_support_alignment
  - id: A14
    question: For each contract field covered by the loaded route overlay, which overlay requirement or prohibition is in effect and how does the contract satisfy it?
    evidence_key: null
    writes_to: contract.route_overlay_requirements
  - id: A15
    question: What is the complete metric_graph for this analysis -- naming every raw variable and derived metric with its inputs and dependency type (ratio, arithmetic_complement, formula_parameter, shared_feature, indirect)? This graph is authored once here and referenced read-only by all later perturbation cycles.
    evidence_key: null
    writes_to: contract.metric_graph
    # metric_graph schema:
    #   <raw_variable>:
    #     inputs: []
    #   <derived_metric>:
    #     inputs: [<raw_variable>, <other_input>]
    #     dependency_type: ratio   # ratio | arithmetic_complement | formula_parameter | shared_feature | indirect
    #   <complement>:
    #     inputs: [<derived_metric>]
    #     dependency_type: arithmetic_complement
    # The expected exceedance set for a perturbation to variable X is the transitive closure of metrics whose inputs chain reaches X.

gates:
  - id: A01-precise
    condition: Estimand is specified precisely enough to execute without further decisions, and the decision anchor names stakeholder decision, candidate actions, and action-change logic inline
  - id: A-method-executable
    depends_on: [A02, A03]
    condition: Method family and primary specification are concrete and executable with no placeholders, "to be determined" fields, or unresolved choices
  - id: A05-axes-types-scope
    condition: Perturbation plan explicitly names axes, types, and scope; each axis probes a route-relevant instability
  - id: A06-stress-tests
    condition: Each challenger alternative is structurally different enough from the primary to expose genuine weaknesses; cosmetic variation does not satisfy this gate
  - id: A07-fallbacks-named
    condition: Assumption-failure policy is backtrack_only (no fallbacks) or amendment_allowed with each pre-approved narrowing fallback named explicitly
  - id: A10-not-widened
    condition: Claim boundary as-locked preserves or narrows the upstream claim boundary; scope, evidence_ceiling, generalization_limit, and effective verb set are never widened
  - id: A11-no-forbidden
    condition: Visibility confirmation names only protocol-approved artifacts; held-out, frozen, or forbidden artifacts are excluded
  - id: A-support-aligned
    depends_on: [A01, A02, A03, A05, A06, A13]
    condition: Every contract field that the examination support registry could affect carries an explicit alignment entry naming the registry classification and how the contract addresses weak or unsupported support
  - id: A-overlay-aligned
    depends_on: [A02, A03, A04, A05, A06, A09, A12, A14]
    condition: Every contract field covered by the loaded route overlay carries an explicit entry stating the overlay requirement or prohibition and how the contract satisfies it
  - id: A15-metric-graph-authored
    condition: contract.metric_graph is populated with at least one node per question-critical variable, each input chain is traceable, and every arithmetic complement relationship is declared explicitly

research_questions:
  - What method families are standard for this question type, route, and data profile given the examination support registry, and which are admissible under the protocol contract?
  - What are known limitations of the proposed primary method under conditions matching the visible cleaned data?
  - What perturbation axes are standard for this route and domain, and which have the highest discriminating power for route-relevant instability?
  - What challenger alternatives would expose genuine structural weaknesses rather than cosmetic variation?
  - What missing-data handling strategies are defensible for the locked method family, and which introduce leakage or visibility violations?

guidance:
  - Cycle A produces a locked specification. Do not execute the primary analysis, perturbations, or challengers here. Execution begins in Cycle C after assumption verification in Cycle B.
  - Contract lock is not a second examination stage. Examination tells you what the data can support; Cycle A translates that into one executable specification inside those constraints.
  - Route overlays may add route-specific fields (causal adds identification strategy; mechanistic adds structural model; predictive adds hyperparameter search space). Capture overlay-specific fields under contract.route_overlay_requirements rather than inventing new top-level contract fields.
  - Competing operationalizations surfaced in formulate must be stability-tested at the contract level. If any reasonable alternative would change method family or active route, append a narrowing entry to claim_boundary.narrowing_log_additions.
  - If A13 or A14 forces narrowing, record the rationale in claim_boundary.narrowing_log_additions. Do not widen elsewhere to compensate.

# Evaluator checks per required gate:
# (1) cycle_history[*].subagents.decisions[*].judgment_gate.gate_id matches the required gate_id
# (2) judgment_gate.reply is a non-null string
# (3) if reply == "agent decides", both agent_decision_if_delegated and agent_rationale are non-null
# Any failure is a blocking defect.
# These judgment gates fire before step4 user_approval; step4 approval confirms the record, not the original choice.

judgment_gates:
  - gate_id: A02-method-family-selected
    stage: analyze
    cycle: A
    trigger: "Always fires before committing contract.method_family; method family selection has no mechanically correct answer and changes the estimand, perturbation space, and assumption set"
    question_text: "Method family for this contract: agent proposes <method_family> based on examination support registry and route overlay. Alternatives are <alt1>, <alt2>. Each changes the perturbation space and assumption set. Confirm, choose an alternative, or reply 'agent decides'."
    options_shape: "labeled_options; reply 'agent decides' is valid"
    recorded_under: "cycle_history[*].subagents.decisions[*].judgment_gate"
    required: true
  - gate_id: A05-perturbation-axes-locked
    stage: analyze
    cycle: A
    trigger: "Always fires before committing contract.perturbation_plan; perturbation axes determine which instabilities the analysis must survive"
    question_text: "Perturbation plan: agent proposes axes=<axes_list>, types=<types>, scope=<scope>. Including or excluding <candidate_axis> changes which route-relevant instabilities are tested. Confirm, adjust, or reply 'agent decides'."
    options_shape: "labeled_options; reply 'agent decides' is valid"
    recorded_under: "cycle_history[*].subagents.decisions[*].judgment_gate"
    required: true
  - gate_id: A07-assumption-failure-policy
    stage: analyze
    cycle: A
    trigger: "Always fires before committing contract.assumption_failure_policy; the policy (backtrack_only vs amendment_allowed) determines whether narrowing fallbacks are pre-approved"
    question_text: "Assumption-failure policy: agent proposes <backtrack_only | amendment_allowed> with fallbacks=<fallback_list>. Choosing amendment_allowed pre-authorizes specific narrowing paths; backtrack_only locks the contract. Confirm, choose an alternative, or reply 'agent decides'."
    options_shape: "labeled_options: backtrack_only | amendment_allowed; reply 'agent decides' is valid"
    recorded_under: "cycle_history[*].subagents.decisions[*].judgment_gate"
    required: true

step4_additions:
  description: After the standard decision, present the fully drafted analysis contract to the user for explicit approval. Record the approval timestamp and channel in contract.user_approval before setting status.current_cycle to B.
  items:
    - estimand_and_decision_anchor
    - method_family_with_upstream_justification
    - primary_specification
    - accuracy_metric_when_required
    - perturbation_plan_axes_types_scope
    - challenger_alternatives_with_structural_differentiation
    - assumption_failure_policy_with_named_fallbacks
    - missing_data_rule
    - subgroup_rule_when_required
    - claim_boundary_as_locked
    - visibility_confirmation
    - examination_support_alignment
    - route_overlay_requirements
    - backtracking_triggers
    - metric_graph_with_all_dependency_types   # A15: authored here; referenced read-only in D, evaluate B, clean S
  user_approval: required

pcs_focus:
  items:
    - "P: Does the locked contract produce outputs that the protocol-specified reality check can actually evaluate?"
    - "C: Can another analyst reproduce the full execution from contract fields plus the locked artifacts without ambiguity?"
    - "S: Does the primary specification survive obvious operationalization variants, or does it depend on fragile examination-stage support?"
