cycle: D
focus: Sensitivity and Challenger Execution
mandatory: true

upstream:
  - contract.perturbation_plan
  - contract.challenger_alternatives
  - primary_execution.outputs
  - primary_execution.status
  - provenance.visibility_set

setup_side_effects: []

checklist:
  - id: D01
    question: What is the perturbation plan from the locked contract -- axes, types, and scope -- restated in full for this execution?
    evidence_key: perturbation_plan_snapshot   # {axes: [{name, type, scope}], total_runs_expected}
    writes_to: null
  - id: D02
    question: For each perturbation axis, what are the outputs, random seeds, runtime, and status, recorded separately from the primary results?
    evidence_key: sensitivity_runs             # [{axis, outputs, random_seeds, runtime_seconds, status: completed|failed, failure_details}]
    writes_to: sensitivity_execution.per_axis
  - id: D03
    question: What challenger alternatives from the locked contract are restated in full for this execution, and for each one, what is the pre-specified structural difference from the primary?
    evidence_key: challenger_plan_snapshot     # [{name, structural_difference, rationale}]
    writes_to: null
  - id: D04
    question: For each challenger, what are the outputs, random seeds, runtime, and status, recorded separately from the primary and sensitivity results?
    evidence_key: challenger_runs              # [{name, outputs, random_seeds, runtime_seconds, status: completed|failed, failure_details}]
    writes_to: challenger_execution.per_challenger
  - id: D05
    question: What is the comparison table across primary, each perturbation axis, and each challenger, using like-for-like metrics and marking material differences without interpreting whether divergence constitutes instability?
    evidence_key: comparison_table             # [{quantity, primary, per_axis: {}, per_challenger: {}, material_difference: bool, threshold_used: if any}]
    writes_to: comparison_table
  - id: D06
    question: If any perturbation or challenger could not execute, is the failure documented as an execution-viability problem with an En follow-up opened or an upstream reopen triggered?
    skip_when: all perturbations and challengers executed successfully
    evidence_key: sensitivity_challenger_failures   # [{kind: axis|challenger, name, failure_mode, follow_up_opened: En|none, reopen_triggered: stage|none}]
    writes_to: null
  - id: D07
    question: For each material difference in the comparison table, is it logged as a flag for evaluate with a concise description, without any revision of the primary result or interpretation of instability?
    skip_when: no material differences
    evidence_key: divergence_flags             # [{quantity, kind: axis|challenger, name, description, severity_hint_if_any}]
    writes_to: evaluation_handoff.flags_for_evaluate
  - id: D08
    question: Does Cycle D refrain from adding post-hoc perturbations or challengers beyond the locked contract, and from using primary outputs to choose what to test?
    evidence_key: null
    writes_to: null

gates:
  - id: D-all-axes-executed
    depends_on: [D01, D02]
    condition: Every perturbation axis in the contract plan is executed or logged as a failure under D06; no axis is silently dropped
  - id: D-all-challengers-executed
    depends_on: [D03, D04]
    condition: Every challenger in the contract plan is executed or logged as a failure under D06; no challenger is silently dropped
  - id: D-outputs-separated
    depends_on: [D02, D04]
    condition: Sensitivity and challenger outputs are stored under sensitivity_execution.per_axis and challenger_execution.per_challenger and are not merged into primary_execution.outputs
  - id: D05-comparison-raw
    condition: Comparison table reports raw comparison only -- material difference is flagged against a pre-specified threshold or qualitative rule, without interpreting whether divergence constitutes instability or revising any result
  - id: D06-failures-handled
    condition: Each unexecuted perturbation or challenger is classified as an execution-viability problem and is either tied to an En follow-up or an upstream reopen with a documented reason
  - id: D08-no-post-hoc
    condition: No perturbation axis or challenger in this cycle was added after seeing primary results; every executed axis and challenger matches the contract plan snapshot exactly

research_questions:
  - What execution failure modes are common for these perturbation axes and challenger methods, and how do they present diagnostically?
  - Are the perturbation and challenger outputs recorded at a granularity that supports like-for-like comparison, or do any outputs require transformation before comparison?
  - Do any perturbation or challenger runs show diagnostic signs of execution artifact (non-convergence, numerical breakdown, degenerate solution) that should be treated as failures rather than results?

guidance:
  - Cycle D executes and separates. It does not revise primary results, reinterpret the contract, or decide whether divergence constitutes instability. That is evaluate's job.
  - Material difference in the comparison table is a binary flag against a pre-specified threshold or rule. The rule must come from the contract or be added as an explicit narrowing entry; it may not be tuned after seeing outputs.
  - Every run records seeds and parameters; unseeded stochastic steps are absent or explicitly justified.
  - If a sensitivity or challenger run accesses a restricted artifact, treat it as a blocking defect and reopen protocol.
  - All-challengers-diverging is a finding for evaluate, not a trigger for revising the primary result.

step4_additions: null
pcs_focus: null
log_extension: null
