cycle: D{n}
focus: '{short description of the follow-up topic, e.g. ''Disentangle likely measurement artifact in variable X from substantive
  variation''}'
mandatory: false
upstream:
- '{list which canonical-YAML fields must be set before the follow-up runs, drawn from structure_profile, relationships, anomalies_and_contradictions,
  support_registry, or fragility_review}'
research_questions:
- '{at most a handful; narrow to the follow-up topic}'
guidance:
- Keep the follow-up narrow. One topic per cycle.
- If the same topic recurs across follow-ups, escalate instead of looping.
- Close the follow-up with decision pass, acknowledge_gap, data_insufficient, reopen_clean, reopen_protocol, reopen_formulate_plus_protocol,
  or archive under the standard decision matrix.
required_evidence:
- id: D{n}01
  question: '{question derived from the specific follow-up topic}'
  evidence_key: '{key name, or null if judgment-driven}'
writes:
  D{n}01: '{canonical-YAML field, list of fields, or null}'
acceptance_criteria:
- id: D{n}01-{short-name}
  condition: '{condition that closes the follow-up topic and is stricter than ''item was answered''}'
