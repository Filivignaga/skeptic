cycle: D
focus: Stage Prohibitions and Backtracking Triggers
mandatory: true
subagents: [evaluator]   # F3: prohibitions and backtracking triggers are derived mechanically from protocol commitments

upstream:
  - data_usage.mode
  - frozen_artifacts.required
  - evidence_rules.leakage
  - evidence_rules.confounding_identification
  - evidence_rules.structure
  - evidence_rules.validation_logic
  - evidence_rules.uncertainty

setup_side_effects: []

checklist:
  - id: D01
    question: What are the major downstream prohibitions across all stages that follow directly from the claim boundary, the chosen data-usage mode, and the evidence rules?
    evidence_key: null
    writes_to: prohibitions.downstream_major
  - id: D02
    question: What may clean not do (for example changing frozen partitions, using restricted artifacts, inventing proxy targets, changing the analyzable population, deciding validation logic, dropping a forbidden variable class from evidence_rules.leakage.forbidden_variable_classes)?
    evidence_key: null
    writes_to: prohibitions.clean
  - id: D03
    question: What may examine not do (for example using restricted holdouts, treating exploratory patterns as confirmed, changing the active route or validation logic, pulling forbidden variables into candidate features)?
    evidence_key: null
    writes_to: prohibitions.examine
  - id: D04
    question: What must analyze respect at contract-lock time (question type, claim boundary, data-usage mode, frozen artifacts, leakage rules, confounding or identification constraints, structure constraints, validation logic, uncertainty expectations)?
    evidence_key: null
    writes_to: prohibitions.analyze_contract_lock
  - id: D05
    question: What must analyze not claim beyond (claims beyond the claim boundary, performance claims without the required validation, causal language without identification, mechanistic claims from fit alone, inferential generalization beyond the target population)?
    evidence_key: null
    writes_to: prohibitions.analyze_claim_limits
  - id: D06
    question: What are the backtracking triggers and the explicit return paths (different mode needed, frozen artifacts impossible, cleaned data changes the analyzable population, examination reveals stronger structure than protocol allowed, analyze needs a route family or claim class outside the admissible set, analysis requires forbidden variables or unauthorized visibility, validation logic fails)?
    evidence_key: null
    writes_to: backtracking_triggers

gates:
  - id: D01-prohibitions-stated
    condition: Major downstream prohibitions are explicit, traceable to the claim boundary, data-usage mode, and evidence rules
  - id: D02-clean-bounds-stated
    condition: Clean constraints are explicit and enforceable without rewriting protocol
  - id: D03-examine-bounds-stated
    condition: Examine constraints are explicit and enforceable without rewriting protocol
  - id: D04-analyze-contract-bounds-stated
    condition: Analyze contract-lock obligations are explicit and cover question type, claim boundary, data-usage mode, frozen artifacts, leakage, confounding or identification, structure, validation logic, and uncertainty
  - id: D05-analyze-bounds-stated
    condition: Analyze claim limits are explicit (no claims beyond boundary, no performance claims without validation, no causal language without identification, no mechanism from fit alone, no inferential generalization beyond target population)
  - id: D06-backtracking-defined
    condition: Backtracking triggers and return paths are explicit, and each trigger names the concrete evidence that would fire it

research_questions:
  - What downstream protocol violations are common for this kind of project, and which ones are usually missed until late?
  - What findings would most clearly mean the project must reopen protocol, and which would only require tightening inside the current stage?
  - What failure modes are usually mistaken for harmless implementation detail but actually widen the claim?

guidance:
  - Every prohibition must be traceable to the claim boundary, the chosen data-usage mode, or the evidence rules. If a prohibition is not traceable, either tighten the upstream rule or drop the prohibition.
  - Minimum backtracking triggers to assess: later work needs a different data-usage mode than protocol approved; frozen artifacts are impossible to create cleanly; cleaned data materially changes the analyzable population or removes required variables; examination shows time order, grouping, interference, or identification matters more than protocol allowed; analyze needs a route family or claim class outside the admissible set approved by protocol; analysis requires forbidden variables or unauthorized data visibility; evaluation shows the allowed claim does not survive the approved validation logic.
  - Do not write prohibitions that amount to "follow protocol." Prohibitions must name a specific downstream action that is forbidden.
  - Return paths must specify which stage to reopen (formulate, protocol, or the current stage only) and what must be re-done.

step4_additions:
  description: After the standard decision, state each field below so downstream stages can pick up the contract without re-reading every cycle entry.
  items:
    - clean_prohibitions
    - examine_prohibitions
    - analyze_contract_lock_obligations
    - analyze_claim_limits
    - backtracking_triggers_with_return_paths
