cycle: F
focus: Communication Assembly and Terminal Fidelity Audit
mandatory: true
upstream:
- translations
- dead_claim_framings
- recommendations
- uncertainty
- visualizations
- delivery.scaffolding
- audience.type
research_questions:
- What deliverable structure conventions exist for this audience and format?
- What self-sufficiency standards apply (can someone use this without the analyst)?
- What reproducibility documentation should accompany the deliverable for this route and audience?
- What intended-use and prohibited-use framing conventions exist for this claim type?
guidance:
- Assemble content following the five mandatory sections. Section 1 (Question) opens with the approved question in audience-appropriate
  language plus the decision context. Section 2 (Findings) carries translated claims, evidence summaries, and bounded recommendations.
  Section 3 (Confidence) carries uncertainty, stability, and predictability. Section 4 (Limitations) carries mandatory limitations,
  caveats, dead-claim limitations, unresolved risks, and any narrowing. Section 5 (Methods Summary) covers provenance, processing,
  question type, route, what was done in plain language, and intended-use / prohibited-use statements.
- The primary deliverable filename follows {project_name}_{audience_type}_{date}.{format_extension}. Companion data files
  follow {project_name}_{content_description}_{date}.{ext}.
- Run machine-checkable validation (F01, F10, F11, F12) as a direct scan of the rendered files in the script. Fix any blocking
  defects before moving to Step 3.
- Every column using a relative temporal reference must carry an explicit year range in the column name or in the data dictionary
  entry. Ambiguous temporal names are a blocking defect.
- Intended-use and prohibited-use statements inherit from formulate's Summary. Do not invent new ones here.
- When plan.null_result_mode is true, Section 2 (Findings) states that no claims survived evaluation, and Section 3 (Confidence)
  states why. The other sections still apply.
required_evidence:
- id: F01
  question: Are all five mandatory deliverable sections present (Question, Findings, Confidence, Limitations, Methods Summary)
    in the rendered deliverable?
  evidence_key: sections_present_scan
  evidence_shape: '{sections_found: [...], sections_missing: [...]}'
- id: F02
  question: Is the primary deliverable rendered to deliverables/ in the chosen format with a filename following {project_name}_{audience_type}_{date}.{format_extension},
    and are all companion data files present with {project_name}_{content_description}_{date}.{ext} names?
  evidence_key: render_metadata
  evidence_shape: '{primary: {path, filename, format, exists, name_pattern_match: bool}, companions: [{path, filename, name_pattern_match:
    bool}]}'
- id: F03
  question: Does the terminal fidelity scan confirm every surviving claim from the evaluate handoff is present in the deliverable,
    every mandatory caveat is present and visible, no claim is upgraded from its verdict, no language exceeds the claim boundary,
    every recommendation cites its parent claim, and no new statistics or queries were computed?
  evidence_key: fidelity_scan
  evidence_shape: '{surviving_claims_present: [...], surviving_claims_missing: [...], caveats_present: [...], caveats_missing_or_buried:
    [...], upgrades_detected: [...], boundary_violations: [...], recommendations_without_parent: [...], computation_boundary_violations:
    [...]}'
- id: F04
  question: If communicate narrowed any claims during this stage, is the narrowing recorded in boundary.narrowing with from,
    to, reason, and cycle?
  evidence_key: null
  skip_when: no narrowing occurred in cycles A-F
- id: F05
  question: Is the deliverable self-sufficient for someone with no prior project context -- every technical term explained,
    every acronym expanded on first use, and no assumption of shared context?
  evidence_key: null
- id: F06
  question: Does the deliverable lead with the audience-relevant question and why it matters, rather than opening with method,
    workflow, or script details?
  evidence_key: opening_scan
  evidence_shape: '{first_paragraph: "...", lead_classification: question_led|method_led|other}'
- id: F07
  question: Does the Methods Summary state data provenance, key processing steps, question type, active route, and what was
    actually done in plain language, and does it include intended-use and prohibited-use statements inherited from formulate's
    Summary?
  evidence_key: methods_section_scan
  evidence_shape: '{provenance_stated, processing_stated, question_type_stated, route_stated, intended_use_present, prohibited_use_present}'
- id: F08
  question: Are material problems, caveats, and limitations surfaced clearly in the deliverable rather than buried, and are
    exploratory dead ends excluded unless needed to explain a limitation?
  evidence_key: null
- id: F10
  question: Do all files in deliverables/ pass the ASCII encoding scan (no em dashes, curly quotes, en dashes, or other non-ASCII
    typographic punctuation)?
  evidence_key: encoding_scan
  evidence_shape: '{files_checked: [...], violations: [{file, position, character}]}'
- id: F11
  question: If companion data files exist, does each have a data dictionary defining every column or field, and does every
    column using a relative temporal reference (last_year_presence, rolling3_years_positive, lag1_*) include the explicit
    year range in either the column name or the data dictionary entry?
  evidence_key: data_dictionary_scan
  evidence_shape: '[{file, columns: [{name, defined: bool, temporal_reference: bool, year_range_disambiguated: bool}]}]'
  skip_when: no companion data files
- id: F12
  question: If companion data files contain quantitative scores or predictions, does the value distribution show entity-level
    variation (no more than 30% of rows sharing an identical value for a key output column), and is any degeneracy explicitly
    disclosed as a limitation?
  evidence_key: degeneracy_scan
  evidence_shape: '[{file, key_output_columns: [{column, identical_pct, disclosed_as_limitation: bool}]}]'
  skip_when: no companion data files with quantitative scores
writes:
  F01: deliverable.primary.sections_present
  F02:
  - deliverable.primary.path
  - deliverable.primary.filename
  - deliverable.primary.format
  - deliverable.companion_files
  F04: boundary
  F05: deliverable.primary.self_sufficient
  F06: deliverable.primary.question_led
  F07: deliverable.primary.methods_grounded
  F08: deliverable.primary.problems_disclosed
  F10: deliverable.primary.encoding_scan
  F11: deliverable.companion_files
  F12: deliverable.companion_files
acceptance_criteria:
- id: F01-sections-complete
  condition: All five mandatory sections (Question, Findings, Confidence, Limitations, Methods Summary) are present in the
    rendered deliverable
- id: F02-deliverable-rendered
  condition: The primary deliverable exists under deliverables/ with the required filename pattern; every companion data file
    follows its naming convention
- id: F03-computation-boundary
  condition: fidelity_scan reports zero computation-boundary violations; the deliverable and script contain only presentation-level
    transformations
- id: F03-fidelity-verified
  condition: fidelity_scan lists every surviving claim as present in the deliverable with zero omissions
- id: F03-caveats-preserved
  condition: fidelity_scan lists every mandatory caveat as present and visible (not buried in footnotes or appendices)
- id: F03-boundary-respected
  condition: fidelity_scan reports zero boundary violations (forbidden verbs, out-of-scope statements, generalization_limit
    breaches) across the deliverable
- id: F03-recommendations-scoped
  condition: fidelity_scan reports every recommendation as citing its parent claim and inheriting its caveats
- id: F05-self-sufficient
  condition: The deliverable is interpretable by someone with no prior project context; technical terms are explained and
    acronyms expanded on first use
- id: F04-narrowing-logged
  condition: If narrowing occurred, boundary.narrowing is populated with from, to, reason, and cycle; otherwise the key is
    absent
- id: F06-question-led
  condition: The deliverable opens with the audience-relevant question and its context, not method or script details
- id: F07-methods-grounded
  condition: The Methods Summary states provenance, processing, question type, active route, and what was done in plain language,
    plus intended-use and prohibited-use statements from formulate's Summary
- id: F08-problems-disclosed
  condition: Material problems, caveats, and limitations are surfaced at the same visual weight as findings; exploratory dead
    ends are excluded unless used to explain a limitation
- id: F10-encoding-clean
  condition: encoding_scan reports zero violations across all files in deliverables/
- id: F11-data-dictionary
  condition: Every companion data file has a data dictionary; every temporal-reference column carries an explicit year range
    in the name or the dictionary entry
- id: F12-degeneracy-disclosed
  condition: No key output column in any companion data file has more than 30% identical values undisclosed; any such degeneracy
    is present and flagged as a limitation
