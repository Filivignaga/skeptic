cycle: B
focus: Assumption Verification
mandatory: true
upstream:
- contract.method_family
- contract.primary_specification
- contract.assumption_failure_policy
- contract.visibility_confirmation
- contract.user_approval
- provenance.visibility_set
- 04_examination.yaml:analysis_constraints
- 04_examination.yaml:fragility_verdicts
research_questions:
- What assumption violations are common for this method family applied to this data profile, and what detection patterns are
  reliable?
- When assumption violations are found, what is the standard domain response -- transform, switch method, proceed with caveats,
  or abort -- and under what conditions does each apply?
- Are the route-required assumption checks comprehensive for this locked specification, or does the specification introduce
  additional assumptions the overlay does not list?
guidance:
- Cycle B verifies assumptions. It does not execute the primary analysis, perturbations, or challengers.
- Treat "proceed with caveats" as an amendment that must be explicitly allowed by the locked assumption_failure_policy. Undocumented
  proceed-with-caveats is a blocking defect.
- If the locked policy is backtrack_only and any assumption fails or is marginal in a way that undermines the method, route
  back to protocol rather than amending the contract.
- Every amendment must invoke only a named pre-approved narrowing fallback from contract.assumption_failure_policy.named_fallbacks;
  invoking any other fallback is a blocking defect.
- If amendment narrows the claim boundary, append a narrowing entry to claim_boundary.narrowing_log_additions with the triggering
  assumption, the fallback invoked, and the narrowed boundary.
required_evidence:
- id: B01
  question: Which assumptions does the loaded route overlay require checking for the locked method, and what is the source
    of each requirement?
  evidence_key: required_assumptions
  evidence_shape: '{assumptions: [{id, assumption, source: route_overlay|contract, check_description}]}'
- id: B02
  question: For each required assumption, what does the check on the actual cleaned, visible data report -- pass, marginal,
    or fail -- and what is the evidence?
  evidence_key: assumption_results
  evidence_shape: '[{id, verdict: pass|marginal|fail, evidence: {statistic_or_diagnostic, value, threshold_if_any, plot_ref_if_any}}]'
- id: B03
  question: If all assumptions passed, is the contract confirmed unchanged and ready for execution?
  evidence_key: null
  skip_when: any required assumption has verdict marginal or fail
- id: B04
  question: If any assumption failed or was marginal, was the locked assumption-failure policy followed -- backtrack_only
    triggers backtracking; amendment_allowed invokes only a named pre-approved narrowing fallback -- and what is the amendment
    record?
  evidence_key: null
  skip_when: all required assumptions passed
- id: B05
  question: If amended, is the amended contract still executable on the visible data, and is the amendment confirmed as narrowing
    (not widening) the claim boundary?
  evidence_key: amendment_executability
  evidence_shape: '{executable: bool, remaining_steps, claim_boundary_impact: narrowed|unchanged|widened_blocked}'
  skip_when: no amendment occurred
writes:
  B01: assumptions.required_checks
  B02: assumptions.results
  B03: assumptions.policy_applied
  B04:
  - assumptions.policy_applied
  - assumptions.amendment
  - contract_amendments
  B05: claim_boundary.narrowing_log_additions
acceptance_criteria:
- id: B02-all-verdicts
  condition: Every required assumption from B01 has a verdict of pass, marginal, or fail, with evidence recorded; no assumption
    is left unevaluated
- id: B-policy-followed
  depends_on:
  - B02
  - B04
  condition: When any assumption failed or was marginal, the locked assumption-failure policy was followed literally -- no
    fallback outside the named pre-approved list was invoked, no post-hoc policy change, no silent proceed-with-caveats when
    the policy is backtrack_only
- id: B05-no-widening
  condition: If the contract was amended, the amendment narrows or preserves the claim boundary and does not widen scope,
    evidence_ceiling, generalization_limit, or the effective verb set
- id: B-contract-viable
  depends_on:
  - B02
  - B03
  - B04
  - B05
  condition: After assumption verification the contract (original or amended) is executable on the visible data with no unresolved
    assumption conflicts
