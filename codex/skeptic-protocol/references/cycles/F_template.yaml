cycle: F{n}
focus: '{short description of the follow-up topic, e.g. ''Resolve whether external validation frame is real or nominal''}'
mandatory: false
upstream:
- '{list which canonical-YAML fields must be set before the follow-up runs, e.g. data_usage.mode, evidence_rules.leakage.relevance}'
research_questions:
- '{at most a handful; narrow to the follow-up topic}'
guidance:
- Keep the follow-up narrow. One topic per cycle.
- If the same topic recurs across follow-ups, escalate instead of looping.
- Close the follow-up as pass, acknowledge_gap, data_insufficient, reformulate, or archive under the standard decision matrix.
- Never defer a decision that belongs to protocol (data-usage mode, frozen artifacts, leakage rules, validation logic, prohibitions,
  backtracking triggers) into a follow-up without closing it here.
required_evidence:
- id: F{n}01
  question: '{question derived from the specific follow-up topic}'
  evidence_key: '{key name, or null if judgment-driven}'
writes:
  F{n}01: '{canonical-YAML field, list of fields, or null}'
acceptance_criteria:
- id: F{n}01-{short-name}
  condition: '{condition that closes the follow-up topic}'
